<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{{ t.login_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <h1 class="login-box__title">{{ t.login_title }}</h1>

    {% if error %}
      <div class="login-error">{{ t.wrong_pin }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.login_submit') }}" id="login-form">
      <p style="font-size:16px;color:#666;margin-bottom:12px">{{ t.select_user }}</p>
      <div class="user-grid">
        {% for u in users %}
          <button type="button" class="user-btn" data-uid="{{ u.id }}"
                  onclick="selectUser(this, '{{ u.id }}')">
            {{ u.name_ar }}
          </button>
        {% endfor %}
      </div>

      <input type="hidden" name="user_id" id="user-id-input" value="">
      <input type="password" name="pin" id="pin-input" class="pin-input"
             maxlength="4" placeholder="••••" readonly>

      <div class="pin-numpad">
        {% for n in range(1, 10) %}
          <button type="button" class="numpad-btn" onclick="addDigit('{{ n }}')">{{ n }}</button>
        {% endfor %}
        <button type="button" class="numpad-btn numpad-btn--clear" onclick="clearPin()">C</button>
        <button type="button" class="numpad-btn" onclick="addDigit('0')">0</button>
        <button type="button" class="numpad-btn" onclick="document.getElementById('login-form').submit()">⏎</button>
      </div>

      <button type="submit" class="btn btn--primary" style="width:100%;min-height:54px;font-size:20px">
        {{ t.login }}
      </button>
    </form>
  </div>
</div>

<script>
function selectUser(btn, uid) {
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('user-btn--active'));
  btn.classList.add('user-btn--active');
  document.getElementById('user-id-input').value = uid;
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-input').focus();
}
function addDigit(d) {
  var inp = document.getElementById('pin-input');
  if (inp.value.length < 4) inp.value += d;
  if (inp.value.length === 4) {
    setTimeout(function() { document.getElementById('login-form').submit(); }, 150);
  }
}
function clearPin() {
  document.getElementById('pin-input').value = '';
}
</script>
</body>
</html>
