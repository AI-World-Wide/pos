{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/cashier.css') }}">
{% endblock %}

{% block body %}
<div class="pos">
  <!-- RIGHT PANEL: Categories -->
  <aside class="pos__categories">
    {% for c in categories %}
      <button class="cat-btn {% if c.id == active_cat_id %}cat-btn--active{% endif %}"
              hx-get="{{ url_for('cashier.get_items', cat_id=c.id) }}"
              hx-target="#items-grid"
              hx-swap="innerHTML"
              onclick="document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('cat-btn--active'));this.classList.add('cat-btn--active')">
        {{ c.name_ar }}
      </button>
    {% endfor %}
  </aside>

  <!-- CENTER PANEL: Items grid -->
  <section class="pos__items">
    <div id="items-grid" class="items-grid">
      {% include "partials/items_grid.html" %}
    </div>
  </section>

  <!-- LEFT PANEL: Current order -->
  <aside class="pos__order">
    <div id="order-panel">
      {% include "partials/order_panel.html" %}
    </div>
  </aside>
</div>

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay" style="display:none"
     onclick="if(event.target===this){this.style.display='none';this.innerHTML=''}">
</div>

<script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/cashier.js') }}"></script>
{% endblock %}
