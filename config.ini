[app]
host = 127.0.0.1
port = 5000
debug = true
secret_key = change-me-in-production

[database]
path = data/pos.db

[vat]
rate = 0.05

[printer]
; Default Windows printer name (matches the spooler name, e.g. "Bar").
; Phase 5 settings UI will auto-discover and let the operator change this.
default_name = Cashier
; ESC/POS cash drawer kick bytes (decimal), default: ESC p 0 25 250
kick_code = 27,112,0,25,250
; Receipt rendering width in pixels (= 72mm at 203 DPI for 80mm thermal paper)
image_width_px = 576

[printers]
; Auto-mapped on first run if the printers table is empty. Each value must
; match the EXACT Windows spooler name (run: Get-Printer | ft Name,PortName).
; Leave a value blank to skip seeding that station.
;   kitchen     -> food items          (e.g. Bar      @ 192.168.1.146)
;   receipt     -> customer receipts    (e.g. Cashier  @ USB001)
;   shisha      -> shisha items         (e.g. Shisha   @ 192.168.1.147)
;   cash_drawer -> printer the drawer is plugged into (usually the receipt one)
kitchen = Bar
receipt = Cashier
shisha = Shisha
cash_drawer = Cashier

[smtp]
; Phase 4 daily report email
host =
port = 587
username =
password =
use_tls = true
from_address =
to_address =
report_time = 23:00

[cafe]
; Phase 5 — these prints on every receipt
name_ar = مقهى
trn = 100000000000000
