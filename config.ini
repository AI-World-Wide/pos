[app]
host = 127.0.0.1
port = 5000
debug = true
secret_key = change-me-in-production

[database]
path = data/pos.db

[vat]
rate = 0.05

[printer]
; Default Windows printer name (matches the spooler name, e.g. "Bar").
; Phase 5 settings UI will auto-discover and let the operator change this.
default_name = Cashier2
; ESC/POS cash drawer kick bytes (decimal), default: ESC p 0 25 250
kick_code = 27,112,0,25,250
; Receipt rendering width in pixels (= 72mm at 203 DPI for 80mm thermal paper)
image_width_px = 576

[printers]
; Auto-mapped on first run if the printers table is empty. Each value must
; match the EXACT Windows spooler name (run: Get-Printer | ft Name,PortName).
; Leave a value blank to skip seeding that station.
;   kitchen     -> food items          (e.g. Bar      @ 192.168.1.146)
;   receipt     -> receipts + invoices  (e.g. Cashier2 @ USB003)
;   shisha      -> shisha items         (e.g. Shisha   @ 192.168.1.147)
;   cash_drawer -> printer the drawer is plugged into (usually the receipt one)
kitchen = Bar
receipt = Cashier2
shisha = Shisha
cash_drawer = Cashier2
; Bump this version to force re-applying the receipt/cash_drawer mapping
; to the values above on the next startup (one-time, doesn't override
; other manual Settings choices afterwards).
reconcile_version = 2

[stations]
; Which prep printer each menu category prints on when an order is sent.
;   shisha       = category names printed on the Shisha printer
;   receipt_only = category names printed on NO prep printer (receipt only)
; ANYTHING NOT LISTED prints on the Kitchen (Bar) printer — so cold drinks,
; hot drinks and juices print on the Bar by default. To stop a category
; from printing on any prep printer, add its name (Arabic or English) to
; receipt_only below, separated by commas, then restart the app.
shisha = Shisha, شيشة
receipt_only =

[smtp]
; Phase 4 daily report email
host =
port = 587
username =
password =
use_tls = true
from_address =
to_address =
report_time = 23:00

[cafe]
; Printed on every receipt (Arabic + English shown together)
name_ar = مقهى الشهد ذ.م.م
name_en = AL SHAHED CAFE L.L.C
trn = 100000000000000
